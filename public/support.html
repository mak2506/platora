<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Fluduro Support | Flower Spirit Support</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "botanical": "#166534",
                        "sage": "#f0fdf4",
                    },
                    fontFamily: {
                        "serif": ["Playfair Display", "serif"],
                        "sans": ["Public Sans", "sans-serif"],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-aurora: linear-gradient(135deg, #ffc2e2 0%, #ffeb99 50%, #99d6ff 100%);
            --bg-aurora-dark: linear-gradient(135deg, #831843 0%, #0c0a09 50%, #0c4a6e 100%);
        }
        
        body {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--bg-aurora);
            background-attachment: fixed;
            transition: background 0.5s ease, color 0.3s ease;
        }

        /* Default Dark Mode based on system preference */
        @media (prefers-color-scheme: dark) {
            body {
                background: var(--bg-aurora-dark);
                color: white;
            }
        }

        /* Force Dark Mode when 'dark' class exists (for GPT sync) */
        .dark body { 
            background: var(--bg-aurora-dark);
            color: white;
        }

        .glass { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Glass styling for media query dark mode too */
        @media (prefers-color-scheme: dark) {
            .glass { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); }
        }
    </style>
</head>
<body class="text-stone-900 dark:text-white font-sans transition-colors duration-300">
    <div class="flex-1 flex flex-col items-center justify-center p-6 sm:p-24 dark:text-white">
        <div class="max-w-xl w-full glass rounded-[3rem] p-12 text-center shadow-2xl">
            <div class="mb-8 flex justify-center">
                <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-xl">
                    <span class="text-5xl">🌸</span>
                </div>
            </div>
            
            <h1 class="font-serif text-5xl font-black mb-6 tracking-tighter dark:text-white">Support</h1>
            <p class="text-stone-700 dark:text-white font-medium leading-relaxed mb-10 text-lg">
                Need help finding your botanical match or have a question about Fluduro? We're here to help.
            </p>

            <div class="space-y-6">
                <!-- Email Section -->
                <div class="flex flex-col items-center p-6 bg-white/30 dark:bg-black/20 rounded-3xl border border-white/40 dark:border-white/5 transition-all hover:scale-[1.02]">
                    <span class="material-symbols-outlined text-4xl mb-2 text-stone-900 dark:text-white">mail</span>
                    <h2 class="text-[10px] font-bold uppercase tracking-widest text-stone-500 dark:text-white mb-1">Email Us</h2>
                    <a href="mailto:support@fluduro.com" class="text-xl font-bold hover:underline">support@fluduro.com</a>
                </div>

                <!-- Website Section -->
                <div class="flex flex-col items-center p-6 bg-white/30 dark:bg-black/20 rounded-3xl border border-white/40 dark:border-white/5 transition-all hover:scale-[1.02]">
                    <span class="material-symbols-outlined text-4xl mb-2 text-stone-900 dark:text-white">public</span>
                    <h2 class="text-[10px] font-bold uppercase tracking-widest text-stone-500 dark:text-white mb-1">Website</h2>
                    <a href="https://fluduro.com" class="text-xl font-bold hover:underline">www.fluduro.com</a>
                </div>
            </div>
        </div>
        
        <footer class="mt-12 text-[10px] font-bold uppercase tracking-widest text-stone-500 dark:text-stone-200 opacity-60">
            Powered by Fluduro Floral Intelligence
        </footer>
    </div>

    <script>
        // Sync Theme from Host (Optional Override)
        function syncTheme() {
            const activeTheme = (window.openai?.theme);
            if (activeTheme === 'dark') { document.documentElement.classList.add('dark'); }
            else if (activeTheme === 'light') { document.documentElement.classList.remove('dark'); }
            // If no activeTheme from host, it defaults to system via CSS media queries
        }
        syncTheme();
        window.addEventListener("openai:set_globals", (e) => e.detail?.globals?.theme && syncTheme());
    </script>
</body>
</html>
