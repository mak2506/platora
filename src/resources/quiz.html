<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Plantora - Personality Quiz</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#ec5b13",
            "background-light": "#f8f6f6",
            "background-dark": "#221610",
          },
          fontFamily: {
            "display": ["Public Sans"]
          },
        },
      },
    }
  </script>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display">
  <div
    class="relative mx-auto flex h-auto min-h-screen max-w-md w-full flex-col bg-emerald-50 dark:bg-stone-950 overflow-x-hidden">
    <!-- Main Quiz Container (Hidden initially) -->
    <div id="quizContainer" style="display: none; flex-direction: column; flex: 1; justify-content: center; padding: 20px;">
      
      <!-- Minimal Card -->
      <div class="bg-white dark:bg-stone-900 rounded-3xl shadow-xl border border-emerald-100 dark:border-emerald-900/30 overflow-hidden flex flex-col p-8">
        
        <!-- Question Section -->
        <div class="mb-8">
          <h3 id="questionText" class="text-emerald-950 dark:text-white text-2xl font-extrabold leading-tight text-center">
            Loading...
          </h3>
        </div>

        <!-- Options List -->
        <div id="optionsContainer" class="flex flex-col gap-3">
          <!-- Options injected here via JS -->
        </div>

        <!-- Hidden / Contextual Action -->
        <div id="footerAction" class="mt-8" style="display: none;">
          <button id="continueBtn"
            class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transform active:scale-[0.98] transition-all">
            <span id="continueText">Reveal My Match</span>
            <span class="material-symbols-outlined">arrow_forward</span>
          </button>
        </div>
        
        <p id="status" class="text-center text-red-500 text-xs mt-4 font-medium h-4"></p>
      </div>
    </div>

    <!-- Initial Loading State -->
    <div id="loadingState" class="flex flex-col items-center justify-center flex-1 p-6">
      <div style="text-align:center; padding: 40px; color:#6b7280;">Loading questions...</div>
    </div>
  </div>

  <script>
      (function () {
        const quizContainer = document.getElementById('quizContainer');
        const loadingState = document.getElementById('loadingState');
        const questionTextEl = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const footerAction = document.getElementById('footerAction');
        const continueBtn = document.getElementById('continueBtn');
        const continueText = document.getElementById('continueText');
        const statusEl = document.getElementById('status');

        let questions = [];
        let answers = {};
        let currentCount = 0;
        let totalCount = 10;
        let isComplete = false;

        function saveState() {
          if (window.openai?.setWidgetState) {
            window.openai.setWidgetState({
              questions,
              answers,
              currentCount,
              totalCount,
              isComplete
            });
          }
        }

        function updateProgressUI() {
          if (isComplete) {
            footerAction.style.display = 'block';
            continueText.textContent = 'Reveal My Match';
          } else {
            footerAction.style.display = 'none';
          }
        }

        // Optimized height notification using ResizeObserver
        if (window.openai?.notifyIntrinsicHeight) {
          const observer = new ResizeObserver(() => {
            window.openai.notifyIntrinsicHeight(document.body.scrollHeight);
          });
          observer.observe(document.body);
        }

        function renderCurrentQuestion() {
          if (!questions.length) return;
          
          const q = questions[0];
          questionTextEl.textContent = q.text;

          const selectedVal = answers[q.id];
          continueBtn.disabled = !selectedVal;

          let html = '';
          (q.options || []).forEach(o => {
            const isSelected = selectedVal === o.value;
            html += `
            <label class="option-label group relative flex items-center gap-4 rounded-2xl border-2 ${isSelected ? 'border-primary/50' : 'border-emerald-100 dark:border-emerald-900/30'} bg-white dark:bg-stone-900 p-5 shadow-sm hover:border-primary/50 transition-all cursor-pointer">
              <input class="peer hidden" name="${q.id}" type="radio" value="${o.value}" ${isSelected ? 'checked' : ''} />
              <div class="flex grow flex-col">
                <p class="text-emerald-900 dark:text-emerald-100 text-lg font-semibold leading-normal text-center">${o.label}</p>
              </div>
            </label>`;
          });
          optionsContainer.innerHTML = html;

          // Listeners for auto-submission
          optionsContainer.querySelectorAll('.option-label').forEach(label => {
            label.onclick = () => {
               const radio = label.querySelector('input');
               radio.checked = true;
               answers[q.id] = radio.value;
               
               // Visual feedback
               optionsContainer.querySelectorAll('.option-label').forEach(lbl => {
                 lbl.classList.remove('border-primary/50');
                 lbl.classList.add('border-emerald-100', 'dark:border-emerald-900/30');
               });
               label.classList.remove('border-emerald-100', 'dark:border-emerald-900/30');
               label.classList.add('border-primary/50');
               
               saveState();
               
               // Auto-submit after delay
               setTimeout(submitAnswer, 300);
            };
          });

          updateProgressUI();
        }

        function submitAnswer() {
          if (isComplete) return;
          const q = questions[0];
          if (!answers[q.id]) return;

          statusEl.textContent = '';
          loadingState.style.display = 'flex';
          loadingState.innerHTML = '<div style="text-align:center; padding: 40px; color:#10b981; font-weight:bold; animation:pulse 1s infinite;">Growing the next question...</div>';
          quizContainer.style.display = 'none';
          
          const currentAnswer = {};
          currentAnswer[q.id] = answers[q.id];
          callTool('submit_answers', { answers: currentAnswer });
        }

        continueBtn.onclick = () => {
          if (isComplete) {
            continueBtn.disabled = true;
            continueText.innerHTML = '<span style="animation: pulse 1s infinite;">Blooming your match...</span>';
            callTool('show_results', {});
            return;
          }
          submitAnswer();
        };

        function render(data) {
          if (!data) return;
          const content = data.structuredContent || data;
          
          if (content.questions || content.nextQuestion) {
            questions = content.nextQuestion ? [content.nextQuestion] : (content.questions || []);
            currentCount = content.currentCount || currentCount;
            totalCount = content.totalCount || totalCount;
            isComplete = content.isComplete || false;

            loadingState.style.display = 'none';
            quizContainer.style.display = 'flex';
            
            renderCurrentQuestion();
            saveState();
          } else if (content.isComplete) {
            isComplete = true;
            currentCount = content.currentCount || totalCount;
            updateProgressUI();
            saveState();
          }
          
          continueBtn.disabled = false;
        }

        function callTool(name, args) {
          if (window.openai?.callTool) {
            window.openai.callTool(name, args);
          } else {
            const id = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : Math.random().toString(36).substring(2) + Date.now().toString(36);
            window.parent.postMessage({
              jsonrpc: '2.0',
              id,
              method: 'tools/call',
              params: { name, arguments: args || {} }
            }, '*');
          }
        }

        window.addEventListener('message', (event) => {
          if (event.source !== window.parent) return;
          const msg = event.data;
          if (!msg || msg.jsonrpc !== '2.0') return;
          
          if (msg.method === 'ui/notifications/tool-result') {
            const data = msg.params?.structuredContent || msg.params;
            if (data?.questions || Array.isArray(data) || Array.isArray(data?.structuredContent)) {
              render(data);
            }
          }
        }, { passive: true });

        // Restore state or initialize from toolOutput
        const state = window.openai?.widgetState;
        if (state && state.questions && state.questions.length > 0) {
          questions = state.questions;
          answers = state.answers || {};
          currentCount = state.currentCount || 0;
          totalCount = state.totalCount || 10;
          isComplete = state.isComplete || false;
          
          loadingState.style.display = 'none';
          quizContainer.style.display = 'flex';
          renderCurrentQuestion();
        } else {
          let d = window.openai?.toolOutput;
          if (d) {
            render(d);
          }
        }
    })();
  </script>
</body>

</html>
