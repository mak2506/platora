<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Plantora - Personality Quiz</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#ec5b13",
            "botanical": "#166534",
            "sage": "#f0fdf4",
          },
          fontFamily: {
            "serif": ["Playfair Display", "serif"],
            "sans": ["Public Sans", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }

    .progress-bar-fill {
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .option-card {
      transition: all 0.2s ease;
    }

    .option-card:hover {
      transform: translateY(-1px);
    }

    .radio-circle {
      width: 24px;
      height: 24px;
      border: 2px solid #d1d5db;
      border-radius: 50%;
      position: relative;
      transition: all 0.2s ease;
    }

    .peer:checked~.radio-circle {
      border-color: #ec5b13;
      background: #ec5b13;
    }

    .peer:checked~.radio-circle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
    }
  </style>
</head>

<body class="text-stone-900 font-sans">
  <div class="relative flex min-h-screen w-full flex-col bg-stone-50 overflow-x-hidden">

    <!-- Top Header -->
    <header class="pt-8 pb-4 text-center">
      <h1 class="font-serif text-3xl font-black text-botanical tracking-tight">Plantora Quiz</h1>
    </header>

    <!-- Progress Section -->
    <div class="px-8 mb-6">
      <div class="flex justify-between items-end mb-2">
        <span id="questionCounter" class="text-[10px] font-bold text-botanical/60 uppercase tracking-widest">Question 1
          of 10</span>
        <span id="percentLabel" class="text-[10px] font-bold text-green-700 uppercase tracking-widest">0%
          Complete</span>
      </div>
      <div class="w-full h-1.5 bg-stone-100 rounded-full overflow-hidden">
        <div id="progressBar" class="progress-bar-fill h-full bg-green-500" style="width: 0%"></div>
      </div>
    </div>

    <!-- Main Content -->
    <main id="quizContent" class="flex-1 px-4 pb-12 flex flex-col">

      <!-- Loading State -->
      <div id="loadingState" class="flex-1 flex flex-col items-center justify-center py-20">
        <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-stone-400 font-medium tracking-wide">Growing your next question...</p>
      </div>

      <!-- Question Card -->
      <div id="questionCard" style="display: none;"
        class="bg-sage/30 rounded-[32px] p-6 shadow-sm border border-sage flex-1 flex flex-col">

        <!-- Illustration Area -->
        <div
          class="w-full bg-white rounded-2xl h-48 mb-6 overflow-hidden flex items-center justify-center border border-sage shadow-inner">
          <img src="https://images.unsplash.com/photo-1599839619722-39751411883e?auto=format&fit=crop&w=600&h=400&q=80"
            alt="Plant Illustration" class="w-full h-full object-cover opacity-80" />
        </div>

        <div class="flex flex-col flex-1">
          <span id="traitLabel" class="text-[10px] font-black text-primary uppercase tracking-[0.2em] mb-2">SOCIAL
            STYLE</span>
          <h2 id="questionText" class="text-2xl font-black text-botanical leading-[1.2] mb-8">
            When you walk into a room full of strangers, what's your first instinct?
          </h2>

          <!-- Options Container -->
          <div id="optionsContainer" class="flex flex-col gap-3 mb-10">
            <!-- Options injected here -->
          </div>

          <!-- Submit Button -->
          <button id="submitBtn" disabled
            class="mt-auto w-full py-5 bg-gradient-to-r from-orange-500 to-primary text-white font-black text-lg rounded-2xl shadow-xl shadow-primary/20 disabled:opacity-50 disabled:grayscale disabled:shadow-none active:scale-[0.98] transition-all flex items-center justify-center gap-3">
            <span id="submitLabel">Submit Answer</span>
            <span class="material-symbols-outlined">arrow_forward</span>
          </button>
        </div>

      </div>
    </main>

    <!-- Sticky Footer Decoration -->
    <footer class="py-6 text-center">
      <span class="text-[9px] font-bold text-stone-300 uppercase tracking-[0.3em]">Part of the Botanical Personality
        Suite</span>
    </footer>

  </div>

  <script>
      (function () {
        // 1. ATTACH LISTENER IMMEDIATELY to avoid missing messages
        window.addEventListener('message', (event) => {
          if (event.source !== window.parent) return;
          const msg = event.data;
          if (msg?.method === 'ui/notifications/tool-result') {
            console.log("Received Tool Result Event:", msg.params);
            render(msg.params?.structuredContent || msg.params);
          }
        }, { passive: true });

        const loadingState = document.getElementById('loadingState');
        const questionCard = document.getElementById('questionCard');
        const traitLabel = document.getElementById('traitLabel');
        const questionTextEl = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const submitBtn = document.getElementById('submitBtn');
        const submitLabel = document.getElementById('submitLabel');
        const progressBar = document.getElementById('progressBar');
        const questionCounter = document.getElementById('questionCounter');
        const percentLabel = document.getElementById('percentLabel');

        let questions = [];
        let answers = {};
        let currentCount = 0;
        let totalCount = 10;
        let isComplete = false;
        let sessionId = null;
        let selectedOption = null;

        function saveState() {
          if (window.openai?.setWidgetState) {
            window.openai.setWidgetState({
              questions,
              answers,
              currentCount,
              totalCount,
              isComplete,
              sessionId
            });
          }
        }

        function syncRichContext() {
          if (!questions.length) return;
          const q = questions[0];
          const status = isComplete ? 'Questionnaire complete' : `On question ${currentCount} of 10`;
          const msg = `Plantora Quiz Progress: ${status}. The user is currently looking at this question: "${q.text}". 
                       Current Session ID: ${sessionId}`;

          if (window.openai?.updateModelContext) {
            window.openai.updateModelContext({ content: [{ type: 'text', text: msg }] });
          }
        }

        function updateProgress() {
          const percent = Math.round((currentCount / totalCount) * 100);
          progressBar.style.width = percent + '%';
          questionCounter.textContent = `Question ${currentCount || 1} of ${totalCount}`;
          percentLabel.textContent = `${percent}% Complete`;
        }

        function renderCurrentQuestion() {
          if (!questions.length) return;
          const q = questions[0];

          questionTextEl.textContent = q.text;
          selectedOption = answers[q.id] || null;
          submitBtn.disabled = !selectedOption;

          optionsContainer.innerHTML = '';
          (q.options || []).forEach(o => {
            const isSelected = selectedOption === o.value;
            const label = document.createElement('label');
            label.className = `option-card relative flex items-center gap-4 rounded-2xl border-2 ${isSelected ? 'border-primary bg-white shadow-md' : 'border-stone-100 bg-white/50'} p-5 cursor-pointer hover:border-primary/30 transition-all`;

            label.innerHTML = `
            <input class="peer hidden" type="radio" name="options" value="${o.value}" ${isSelected ? 'checked' : ''} />
            <div class="flex-1">
              <p class="text-stone-800 font-bold text-sm leading-tight">${o.label}</p>
            </div>
            <div class="radio-circle"></div>
          `;

            label.onclick = () => {
              selectedOption = o.value;
              answers[q.id] = o.value;
              submitBtn.disabled = false;

              // Re-render styles
              document.querySelectorAll('.option-card').forEach(el => {
                el.classList.remove('border-primary', 'shadow-md');
                el.classList.add('border-stone-100', 'bg-white/50');
              });
              label.classList.add('border-primary', 'shadow-md');
              label.classList.remove('border-stone-100', 'bg-white/50');

              saveState();
            };

            optionsContainer.appendChild(label);
          });

          updateProgress();
        }

        submitBtn.onclick = () => {
          if (submitBtn.disabled) return;

          console.log(`[UI] Submit clicked. isComplete: ${isComplete}, sessionId: ${sessionId}`);

          if (isComplete) {
            submitBtn.disabled = true;
            submitLabel.textContent = "Blooming...";
            console.log("[UI] Calling show_results");
            callTool('show_results', { sessionId: sessionId || undefined });
            return;
          }

          const q = questions[0];
          const currentAnswer = {};
          currentAnswer[q.id] = answers[q.id];

          // UI Feedback
          submitBtn.disabled = true;
          submitLabel.textContent = "Submitting...";
          loadingState.style.display = 'flex';
          questionCard.style.display = 'none';

          console.log(`[UI] Submitting answer for ${q.id}: ${answers[q.id]}`);
          callTool('submit_answers', { answers: currentAnswer, sessionId: sessionId || undefined });
        };

        function render(data) {
          if (!data) return;
          console.log("Rendering with data:", JSON.stringify(data).substring(0, 100) + "...");
          const content = data.structuredContent || data;

          if (content.sessionId) sessionId = content.sessionId;
          if (content.trait) traitLabel.textContent = content.trait;

          if (content.questions || content.nextQuestion) {
            questions = content.nextQuestion ? [content.nextQuestion] : (content.questions || []);
            currentCount = content.currentCount || currentCount;
            totalCount = content.totalCount || totalCount;
            isComplete = content.isComplete || false;

            loadingState.style.display = 'none';
            questionCard.style.display = 'flex';

            if (isComplete) {
              submitLabel.textContent = "Reveal My Match";
              submitBtn.disabled = false;
            } else {
              submitLabel.textContent = "Submit Answer";
            }

            renderCurrentQuestion();
            saveState();
            syncRichContext();
          } else if (content.isComplete) {
            isComplete = true;
            currentCount = totalCount;
            submitLabel.textContent = "Reveal My Match";
            submitBtn.disabled = false;
            updateProgress();
            saveState();
            syncRichContext();
          }
        }

        async function callTool(name, args) {
          if (sessionId && !args.sessionId) args.sessionId = sessionId;
          console.log(`[Quiz SDK] callTool('${name}') with args:`, args);
          
          try {
            if (window.openai?.callTool) {
              const response = await window.openai.callTool(name, args);
              console.log("[SDK] Received tool response:", response);
              
              // 3. SEND FOLLOW-UP MESSAGE for interactivity
              if (window.openai?.sendFollowUpMessage) {
                 if (name === 'submit_answers') {
                   window.openai.sendFollowUpMessage({ prompt: "I've submitted my answer! What's next?" });
                 } else if (name === 'show_results') {
                   window.openai.sendFollowUpMessage({ prompt: "Reveal my botanical match!" });
                 }
              }

              if (response && response.structuredContent) {
                 render(response.structuredContent);
              } else if (response) {
                 render(response);
              }
            } else {
              console.log("[SDK] Fallback to postMessage tools/call");
              window.parent.postMessage({
                jsonrpc: '2.0',
                id: 'id-' + Date.now(),
                method: 'tools/call',
                params: { name, arguments: args || {} }
              }, '*');
            }
          } catch (err) {
            console.error("[SDK] callTool error:", err);
            // Re-enable UI so user can retry
            loadingState.style.display = 'none';
            questionCard.style.display = 'flex';
            submitBtn.disabled = false;
            submitLabel.textContent = "Retry Submission";
          }
        }

        // 2. MULTI-LAYERED INITIALIZATION
        function initApp() {
          console.log("[Quiz] Initiating layered sync...");
          
          // Layer 1: Immediate check
          const hasData = !!(window.openai?.toolOutput || window.openai?.widgetState);
          if (hasData) {
            console.log("[Quiz] Syncing from immediate host data");
            render(window.openai.toolOutput || window.openai.widgetState);
          }

          // Layer 2: Retries (Host async init)
          let retries = 0;
          const interval = setInterval(() => {
            retries++;
            if (retries > 10) { // Give up after 2 seconds
              clearInterval(interval);
              return;
            }

            const dataFound = !!(window.openai?.toolOutput || window.openai?.widgetState);
            const isRendered = loadingState.style.display === 'none';

            if (dataFound && !isRendered) {
               console.log("[Quiz] Syncing from delayed host init...");
               render(window.openai.toolOutput || window.openai.widgetState);
               clearInterval(interval);
            }
          }, 200);
        }

        // Height sync
        if (window.openai?.notifyIntrinsicHeight) {
          new ResizeObserver(() => {
            window.openai.notifyIntrinsicHeight(document.body.scrollHeight);
          }).observe(document.body);
        }

        // Start the checks
        initApp();
      })();
  </script>
</body>

</html>
