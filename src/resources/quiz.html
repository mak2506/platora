<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Plantora - Personality Quiz</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#ec5b13",
            "botanical": "#166534",
            "sage": "#f0fdf4",
          },
          fontFamily: {
            "serif": ["Playfair Display", "serif"],
            "sans": ["Public Sans", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    body {
      min-height: 100dvh;
      overflow-x: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .progress-bar-fill {
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .option-card {
      transition: all 0.2s ease;
    }

    .option-card:hover {
      transform: translateY(-1px);
    }

    .radio-circle {
      width: 24px;
      height: 24px;
      border: 2px solid #d1d5db;
      border-radius: 50%;
      position: relative;
      transition: all 0.2s ease;
    }

    .peer:checked~.radio-circle {
      border-color: #ec5b13;
      background: #ec5b13;
    }

    .peer:checked~.radio-circle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
    }
  </style>
</head>

<body class="bg-yellow-400 text-stone-950 font-sans transition-colors duration-300">
  <div class="relative flex min-h-screen w-full flex-col dark:bg-stone-950 overflow-x-hidden transition-colors">


    <!-- Progress Section -->
    <div class="px-8 mb-6">
      <div class="flex justify-between items-end mb-2">
        <span id="questionCounter"
          class="text-[10px] font-black text-stone-900/60 dark:text-yellow-400/60 uppercase tracking-widest">Question 1
          of 10</span>
        <span id="percentLabel"
          class="text-[10px] font-black text-stone-950 dark:text-yellow-400 uppercase tracking-widest">0%
          Complete</span>
      </div>
      <div class="w-full h-2 bg-stone-900/10 dark:bg-yellow-400/10 rounded-full overflow-hidden">
        <div id="progressBar" class="progress-bar-fill h-full bg-stone-950 dark:bg-yellow-400" style="width: 0%"></div>
      </div>
    </div>

    <!-- Main Content -->
    <main id="quizContent" class="flex-1 px-4 pb-12 flex flex-col">

      <!-- Decorative Header Image -->
      <div class="px-4 mb-4">
        <div class="w-full h-32 overflow-hidden rounded-2xl flex items-center justify-center">
          <img src="https://zjfltpggvcwomlwfcgci.supabase.co/storage/v1/object/public/assests/sunflower.png"
            alt="Botanical Background" class="max-w-full max-h-full object-contain">
        </div>
      </div>

      <!-- Loading State -->
      <div id="loadingState"
        class="flex-1 flex flex-col items-center justify-center py-20 text-stone-950 dark:text-yellow-400">
        <div
          class="w-12 h-12 border-4 border-stone-950 dark:border-yellow-400 border-t-transparent rounded-full animate-spin">
        </div>
        <p class="mt-4 font-bold tracking-wide">Growing your next question...</p>
      </div>

      <!-- Question Card -->
      <div id="questionCard" style="display: none;"
        class="bg-white/95 dark:bg-stone-900/90 rounded-[40px] p-8 shadow-2xl border border-stone-200 dark:border-stone-800 flex-1 flex flex-col transition-colors">

        <div class="flex flex-col flex-1 text-stone-950 dark:text-white">
          <span id="traitLabel"
            class="text-[10px] font-black text-stone-400 dark:text-stone-500 uppercase tracking-[0.3em] mb-3">SOCIAL
            STYLE</span>
          <h2 id="questionText" class="text-3xl font-black leading-[1.1] mb-10 tracking-tight">
            When you walk into a room full of strangers, what's your first instinct?
          </h2>

          <!-- Options Container -->
          <div id="optionsContainer" class="flex flex-col gap-3 mb-10">
            <!-- Options injected here -->
          </div>

          <!-- Submit Button -->
          <button id="submitBtn" disabled
            class="mt-auto w-full py-6 bg-stone-950 text-yellow-400 font-black text-xl rounded-2xl shadow-2xl hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-3 dark:bg-yellow-400 dark:text-stone-950 mb-4">
            <span id="submitLabel">Submit Answer</span>
            <span class="material-symbols-outlined">arrow_forward</span>
          </button>
        </div>

        <!-- Completion State -->
        <div id="completionState" style="display: none;"
          class="flex-1 flex flex-col items-center justify-center py-12 text-center animate-fade-in">
          <div class="mb-6 w-20 h-20 bg-emerald-100 dark:bg-emerald-950/30 rounded-full flex items-center justify-center text-emerald-600 dark:text-emerald-400">
            <span class="material-symbols-outlined text-5xl">check_circle</span>
          </div>
          <h2 class="text-4xl font-serif font-black text-stone-800 dark:text-white mb-4">Journey Complete!</h2>
          <p class="text-stone-600 dark:text-stone-400 text-xl mb-10 leading-relaxed max-w-sm mx-auto">
            Your botanical essence has been distilled... 🌸<br>
          </p>
          
          <div class="bg-stone-950 dark:bg-yellow-400 text-yellow-400 dark:text-stone-950 px-8 py-4 rounded-2xl font-black text-lg tracking-widest animate-pulse flex items-center gap-3">
             <span class="material-symbols-outlined">arrow_downward</span>
             SCROLL DOWN FOR RESULTS
             <span class="material-symbols-outlined">arrow_downward</span>
          </div>
        </div>

      </div>
    </main>


  </div>

  <script>
      (function () {
        // 1. ATTACH LISTENER IMMEDIATELY to avoid missing messages
        window.addEventListener('message', (event) => {
          if (event.source !== window.parent) return;
          const msg = event.data;
          if (msg?.method === 'ui/notifications/tool-result') {
            console.log("Received Tool Result Event:", msg.params);
            render(msg.params?.structuredContent || msg.params);
          }
        }, { passive: true });

        const loadingState = document.getElementById('loadingState');
        const questionCard = document.getElementById('questionCard');
        const traitLabel = document.getElementById('traitLabel');
        const questionTextEl = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const submitBtn = document.getElementById('submitBtn');
        const submitLabel = document.getElementById('submitLabel');
        const progressBar = document.getElementById('progressBar');
        const questionCounter = document.getElementById('questionCounter');
        const percentLabel = document.getElementById('percentLabel');

        let questions = [];
        let answers = {};
        let currentCount = 0;
        let totalCount = 10;
        let isComplete = false;
        // Try to recover sessionId from storage or URL as first-line fallback
        const urlParams = new URLSearchParams(window.location.search);
        let sessionId = urlParams.get('sessionId') || localStorage.getItem('plantora_session_id') || null;

        let selectedOption = null;

        function saveState() {
          if (sessionId) localStorage.setItem('plantora_session_id', sessionId);
          if (window.openai?.setWidgetState) {
            window.openai.setWidgetState({
              questions,
              answers,
              currentCount,
              totalCount,
              isComplete,
              sessionId
            });
          }
        }

        function syncRichContext() {
          if (!questions.length) return;
          const q = questions[0];
          const status = isComplete ? 'Questionnaire complete' : `On question ${currentCount} of 10`;
          const msg = `Plantora Quiz Progress: ${status}. The user is currently looking at this question: "${q.text}". 
                       Current Session ID: ${sessionId}`;

          if (window.openai?.updateModelContext) {
            window.openai.updateModelContext({ content: [{ type: 'text', text: msg }] });
          }
        }

        function updateProgress() {
          const percent = Math.round((currentCount / totalCount) * 100);
          progressBar.style.width = percent + '%';
          questionCounter.textContent = `Question ${currentCount || 1} of ${totalCount}`;
          percentLabel.textContent = `${percent}% Complete`;
        }

        function renderCurrentQuestion() {
          if (!questions.length) return;
          const q = questions[0];

          questionTextEl.textContent = q.question || q.text || "";
          selectedOption = answers[q.id] || null;
          submitBtn.disabled = !selectedOption;

          optionsContainer.innerHTML = '';
          (q.options || []).forEach(o => {
            const isSelected = selectedOption === o.value;
            const label = document.createElement('label');
            label.className = `option-card relative flex items-center gap-4 rounded-3xl border-2 transition-all p-5 cursor-pointer 
              ${isSelected ? 'border-stone-950 bg-stone-950 text-yellow-400 dark:border-yellow-400 dark:bg-yellow-400 dark:text-stone-900 shadow-xl scale-[1.02]'
                : 'border-stone-200 bg-white/50 dark:bg-stone-800/50 dark:border-stone-700 dark:text-stone-300 hover:border-stone-400 dark:hover:border-stone-500'}`;

            label.innerHTML = `
            <input class="peer hidden" type="radio" name="options" value="${o.value}" ${isSelected ? 'checked' : ''} />
            <div class="flex-1">
              <p class="font-bold text-sm leading-tight">${o.label}</p>
            </div>
            <div class="radio-circle border-stone-300 dark:border-stone-600 ${isSelected ? 'border-yellow-400 dark:border-stone-950' : ''}">
               <div class="absolute inset-1 rounded-full ${isSelected ? 'bg-yellow-400 dark:bg-stone-950' : ''}"></div>
            </div>
          `;

            label.onclick = () => {
              selectedOption = o.value;
              answers[q.id] = o.value;
              submitBtn.disabled = false;

              // Re-render styles
              document.querySelectorAll('.option-card').forEach(el => {
                el.classList.remove('border-primary', 'shadow-md');
                el.classList.add('border-stone-100', 'bg-white/50');
              });
              label.classList.add('border-primary', 'shadow-md');
              label.classList.remove('border-stone-100', 'bg-white/50');

              saveState();
            };

            optionsContainer.appendChild(label);
          });

          updateProgress();
        }

        submitBtn.onclick = () => {
          if (submitBtn.disabled) return;

          console.log(`[UI] Submit clicked. isComplete: ${isComplete}, sessionId: ${sessionId}`);

          if (isComplete) {
            submitBtn.disabled = true;
            submitLabel.textContent = "Blooming...";
            console.log("[UI] Calling show_results");

            // Wait a moment for UX, then show completion message
            setTimeout(() => {
              loadingState.style.display = 'none';
              questionCard.style.display = 'none';
              document.getElementById('completionState').style.display = 'flex';

              if (window.openai?.notifyIntrinsicHeight) {
                window.openai.notifyIntrinsicHeight(document.body.scrollHeight);
              }
            }, 800);

            callTool('show_results', { sessionId: sessionId || undefined });
            return;
          }

          const q = questions[0];
          const currentAnswer = {};
          currentAnswer[q.id] = answers[q.id];

          // UI Feedback
          submitBtn.disabled = true;
          submitLabel.textContent = "Submitting...";
          loadingState.style.display = 'flex';
          questionCard.style.display = 'none';

          console.log(`[UI] Submitting answer for ${q.id}: ${answers[q.id]}`);
          callTool('submit_answers', { answers: currentAnswer, sessionId: sessionId || undefined });
        };

        function render(data) {
          if (!data) return;
          console.log("[Quiz] Render data:", JSON.stringify(data).substring(0, 100) + "...");
          const content = data.structuredContent || data;

          if (content.sessionId) {
            sessionId = content.sessionId;
            localStorage.setItem('plantora_session_id', sessionId);
          }

          // Inclusive check for any form of question data
          const incomingQuestion = content.question || content.nextQuestion || (content.questions && content.questions[0]);

          if (incomingQuestion) {
            questions = [incomingQuestion];

            // Normalize counts
            if (content.currentQuestion !== undefined) {
              currentCount = content.currentQuestion + 1;
            } else if (content.currentCount !== undefined) {
              currentCount = content.currentCount;
            } else if (!currentCount) {
              currentCount = 1;
            }

            totalCount = content.totalQuestions || content.totalCount || 10;
            isComplete = !!content.isComplete;

            loadingState.style.display = 'none';
            questionCard.style.display = 'flex';

            if (isComplete) {
              submitLabel.textContent = "Reveal My Match";
              submitBtn.disabled = false;
            } else {
              submitLabel.textContent = "Submit Answer";
            }

            renderCurrentQuestion();
            saveState();
            syncRichContext();
          }

          if (window.openai?.notifyIntrinsicHeight) {
            setTimeout(() => {
              window.openai.notifyIntrinsicHeight(document.body.scrollHeight);
            }, 100);
          }
        }

        async function callTool(name, args) {
          if (sessionId && !args.sessionId) args.sessionId = sessionId;
          console.log(`[Quiz SDK] callTool('${name}') with args:`, args);

          try {
            if (window.openai?.callTool) {
              const response = await window.openai.callTool(name, args);
              console.log("[SDK] Received tool response:", response);

              // 3. SEND FOLLOW-UP MESSAGE for interactivity
              if (window.openai?.sendFollowUpMessage) {
                if (name === 'submit_answers') {
                  window.openai.sendFollowUpMessage({ prompt: "I've submitted my answer! What's next?" });
                } else if (name === 'show_results') {
                  window.openai.sendFollowUpMessage({ prompt: "Reveal my botanical match!" });
                }
              }

              if (response && response.structuredContent) {
                render(response.structuredContent);
              } else if (response) {
                render(response);
              }
            } else {
              console.log("[SDK] Fallback to postMessage tools/call");
              window.parent.postMessage({
                jsonrpc: '2.0',
                id: 'id-' + Date.now(),
                method: 'tools/call',
                params: { name, arguments: args || {} }
              }, '*');
            }
          } catch (err) {
            console.error("[SDK] callTool error:", err);
            // Re-enable UI so user can retry
            loadingState.style.display = 'none';
            questionCard.style.display = 'flex';
            submitBtn.disabled = false;
            submitLabel.textContent = "Retry Submission";
          }
        }

        // 2. MULTI-LAYERED INITIALIZATION
        async function initApp() {
          console.log("[Quiz] Initiating layered sync...");

          // Layer 1: Immediate check
          const hasData = !!(window.openai?.toolOutput || window.openai?.widgetState);
          if (hasData) {
            console.log("[Quiz] Syncing from immediate host data");
            render(window.openai.toolOutput || window.openai.widgetState);
            return;
          }

          // Layer 2: Retries (Host async init) + Recovery tool
          let retries = 0;
          const interval = setInterval(async () => {
            retries++;

            const dataFound = !!(window.openai?.toolOutput || window.openai?.widgetState);
            const isRendered = loadingState.style.display === 'none';

            if (dataFound && !isRendered) {
              console.log("[Quiz] Syncing from delayed host init...");
              render(window.openai.toolOutput || window.openai.widgetState);
              clearInterval(interval);
              return;
            }

            if (retries > 50) { // After 10 seconds, try manual recovery
              clearInterval(interval);
              if (!isRendered && sessionId) {
                console.log("[Quiz] Manual recovery using get_quiz_state...");
                await callTool('get_quiz_state', { sessionId });
              }
              return;
            }
          }, 200);
        }

        // Height sync
        if (window.openai?.notifyIntrinsicHeight) {
          new ResizeObserver(() => {
            window.openai.notifyIntrinsicHeight(document.body.scrollHeight);
          }).observe(document.body);
        }

        // Start the checks
        initApp();

        // Theme Sync
        function syncTheme() {
          const theme = window.openai?.theme || 'light';
          console.log("[Quiz] Syncing theme:", theme);
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        }

        // Initial sync
        syncTheme();

        // Auto-Resize
        if (window.openai?.notifyIntrinsicHeight) {
          const observer = new ResizeObserver(() => {
            window.openai.notifyIntrinsicHeight(document.body.scrollHeight);
          });
          observer.observe(document.body);
        }
      })();
  </script>
</body>

</html>
