<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plantora Results</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 16px;
      background: #faf9f7;
      color: #1a1a1a;
      line-height: 1.6;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .flower-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #2d5a27;
      margin: 0 0 12px;
    }
    .flower-desc {
      margin: 0 0 20px;
      color: #444;
    }
    .btn {
      display: inline-block;
      margin-right: 8px;
      padding: 10px 20px;
      background: #2d5a27;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .btn:hover { background: #3d7a37; }
    .btn-secondary { background: #666; }
    .btn-secondary:hover { background: #555; }
  </style>
</head>
<body>
  <div class="card">
    <h2 class="flower-name" id="flowerName">—</h2>
    <p class="flower-desc" id="flowerDesc">Loading…</p>
    <button id="endBtn" class="btn">Done</button>
  </div>
  <script>
    (function() {
      const nameEl = document.getElementById('flowerName');
      const descEl = document.getElementById('flowerDesc');
      const endBtn = document.getElementById('endBtn');

      function render(data) {
        if (!data) return;
        const f = data.flower;
        if (!f) {
          nameEl.textContent = '—';
          descEl.textContent = 'Unable to determine your flower match.';
          return;
        }
        nameEl.textContent = (f.name || '—') + ' \u{1F338}';
        descEl.textContent = f.description || '';
      }

      function callTool(name, args) {
        window.parent.postMessage({
          jsonrpc: '2.0',
          id: crypto.randomUUID(),
          method: 'tools/call',
          params: { name, arguments: args || {} }
        }, '*');
      }

      endBtn.onclick = () => callTool('end', {});

      window.addEventListener('message', (event) => {
        if (event.source !== window.parent) return;
        const msg = event.data;
        if (!msg || msg.jsonrpc !== '2.0') return;
        if (msg.method === 'ui/notifications/tool-result') {
          render(msg.params?.structuredContent);
        }
      }, { passive: true });

      if (window.openai?.toolOutput) render(window.openai.toolOutput?.structuredContent);
    })();
  </script>
</body>
</html>
