<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Plantora Results</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {},
          fontFamily: {
            "headline": ["Public Sans", "sans-serif"],
            "body": ["Public Sans", "sans-serif"],
            "label": ["Public Sans", "sans-serif"],
            "serif": ["Playfair Display", "serif"]
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: opacity 0.5s ease-in-out;
    }

    .sun-glow {
      background: radial-gradient(circle at center, #fef08a 0%, transparent 70%);
    }

    /* Animation Container */
    .animation-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 200px;
    }

    /* SVG Flower Animation */
    svg.flower {
      width: 180px;
      height: 180px;
      overflow: visible;
    }

    /* Core Petals */
    .petal {
      transform-origin: 50% 70%;
      opacity: 0;
      transform: scale(0);
      transition: fill 1s ease;
    }

    .leaf {
      transform-origin: 50% 90%;
      opacity: 0;
      transform: scale(0) rotate(0deg);
      fill: #22c55e;
    }

    .stem {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      stroke: #16a34a;
      stroke-width: 4;
      stroke-linecap: round;
      fill: none;
    }

    /* Bloom Animations */
    .bloom .stem {
      animation: drawStem 1.5s ease-out forwards;
    }

    .bloom .leaf-left {
      animation: popLeaf 1s 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      transform-origin: bottom right;
    }

    .bloom .leaf-right {
      animation: popLeafRight 1s 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      transform-origin: bottom left;
    }

    .bloom .petal-center {
      animation: popPetal 1.2s 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .bloom .petal-left {
      animation: popPetalLeft 1.2s 1.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .bloom .petal-right {
      animation: popPetalRight 1.2s 1.9s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .bloom .petal-back-left {
      animation: popPetalBackLeft 1.2s 1.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .bloom .petal-back-right {
      animation: popPetalBackRight 1.2s 1.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    /* Dynamic Colors based on Flower Type */
    .theme-rose .petal {
      fill: #ef4444;
    }

    .theme-sunflower .petal {
      fill: #eab308;
    }

    .theme-lotus .petal {
      fill: #ec4899;
    }

    .theme-lavender .petal {
      fill: #8b5cf6;
    }

    .theme-sunflower .center-disk {
      opacity: 0;
      fill: #422006;
      animation: fadeInCenter 1s 2s forwards;
    }

    .center-disk {
      opacity: 0;
    }

    /* Keyframes */
    @keyframes popIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes drawStem {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes popLeaf {
      to {
        opacity: 1;
        transform: scale(1) rotate(-15deg);
      }
    }

    @keyframes popLeafRight {
      to {
        opacity: 1;
        transform: scale(1) rotate(15deg);
      }
    }

    @keyframes popPetal {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes popPetalLeft {
      to {
        opacity: 1;
        transform: scale(1) rotate(-25deg);
      }
    }

    @keyframes popPetalRight {
      to {
        opacity: 1;
        transform: scale(1) rotate(25deg);
      }
    }

    @keyframes popPetalBackLeft {
      to {
        opacity: 0.8;
        transform: scale(0.85) rotate(-45deg);
      }
    }

    @keyframes popPetalBackRight {
      to {
        opacity: 0.8;
        transform: scale(0.85) rotate(45deg);
      }
    }

    @keyframes fadeInCenter {
      to {
        opacity: 1;
      }
    }

    /* Optional flower specific styles like .flower-name colors */
    .theme-rose #flowerName {
      color: #dc2626;
    }

    .theme-sunflower #flowerName {
      color: #ca8a04;
    }

    .theme-lotus #flowerName {
      color: #db2777;
    }

    .theme-lavender #flowerName {
      color: #7c3aed;
    }
  </style>
</head>

<body class="bg-emerald-50 font-body text-emerald-900 overflow-x-hidden w-full h-full m-0 p-0 absolute">
  <!-- TopAppBar -->
  <header
    class="fixed top-0 w-full z-50 bg-emerald-50 dark:bg-emerald-950 flex justify-between items-center px-4 h-16 border-none">
    <button
      class="p-2 text-emerald-700 dark:text-emerald-400 hover:bg-emerald-100/50 dark:hover:bg-emerald-900/50 transition-colors active:scale-95 duration-150">
      <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
    </button>
    <h1 class="font-serif text-lg font-bold text-emerald-800 dark:text-emerald-200 tracking-tight">Plantora</h1>
    <button
      class="p-2 text-emerald-700 dark:text-emerald-400 hover:bg-emerald-100/50 dark:hover:bg-emerald-900/50 transition-colors active:scale-95 duration-150">
      <span class="material-symbols-outlined" data-icon="share">share</span>
    </button>
  </header>

  <main class="pt-24 pb-32 px-6 flex flex-col items-center min-h-screen relative overflow-hidden">
    <!-- Background Decorative Elements -->
    <div class="absolute top-20 right-[-10%] w-64 h-64 bg-yellow-200/40 rounded-full blur-3xl -z-10"></div>
    <div class="absolute bottom-40 left-[-10%] w-72 h-72 bg-emerald-200/30 rounded-full blur-3xl -z-10"></div>

    <!-- Result Card Content -->
    <div class="w-full max-w-md">
      <!-- Header Section -->
      <div class="text-center mb-8">
        <span
          class="inline-block px-4 py-1 bg-emerald-100 text-emerald-700 text-xs font-bold tracking-widest uppercase rounded-full mb-3">Quiz
          Result</span>
        <h2 class="text-3xl font-black text-emerald-900 leading-tight">Your Plant Soulmate is...</h2>
      </div>

      <!-- Main Celebratory Card -->
      <div id="resultCard"
        class="relative glass-card rounded-3xl p-8 shadow-2xl shadow-emerald-900/5 border border-white/50 overflow-hidden text-center">

        <!-- SVG Bloom Animation Container replacing standard image -->
        <div class="relative h-64 w-full flex items-end justify-center mb-6">
          <div class="absolute inset-0 sun-glow opacity-60"></div>
          <!-- Stylized Pot -->
          <div class="absolute bottom-0 w-32 h-16 bg-emerald-800 rounded-t-lg rounded-b-2xl z-10 shadow-lg"></div>

          <div id="animationContainer" class="animation-container z-20 pb-12">
            <svg class="flower" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
              <!-- Stem (slightly offset to match pot) -->
              <path class="stem" d="M50 110 C 50 80, 50 60, 50 50" />
              <!-- Leaves -->
              <path class="leaf leaf-left" d="M50 90 C 20 90, 10 70, 50 85Z" />
              <path class="leaf leaf-right" d="M50 85 C 80 85, 90 65, 50 80Z" />
              <!-- Back Petals -->
              <path class="petal petal-back-left" d="M50 50 C 10 30, 20 -10, 50 50Z" />
              <path class="petal petal-back-right" d="M50 50 C 90 30, 80 -10, 50 50Z" />
              <!-- Front Petals -->
              <path class="petal petal-left" d="M50 55 C 10 40, 30 0, 50 55Z" />
              <path class="petal petal-right" d="M50 55 C 90 40, 70 0, 50 55Z" />
              <path class="petal petal-center" d="M50 60 C 20 20, 80 20, 50 60Z" />
              <!-- Center (visible for Sunflower) -->
              <circle class="center-disk" cx="50" cy="50" r="12" />
            </svg>
          </div>
        </div>

        <!-- Text Content -->
        <h3 id="flowerName" class="text-2xl font-serif font-black text-emerald-800 mb-3 transition-colors duration-300">
          Growing...</h3>
        <p id="flowerDesc" class="text-emerald-700 leading-relaxed italic px-4">
          Computing the petals of your personality.
        </p>

      </div>

      <!-- Action Buttons -->
      <div class="mt-8 space-y-4 w-full">
        <!-- Our 'Complete Journey' button overriding the design's share button to preserve logic -->
        <button id="endBtn"
          class="w-full py-5 bg-emerald-800 hover:bg-emerald-900 disabled:bg-gray-400 disabled:cursor-not-allowed text-yellow-400 font-black text-lg rounded-full shadow-xl shadow-emerald-900/20 active:scale-95 transition-all flex items-center justify-center gap-3">
          <span class="material-symbols-outlined" data-icon="local_florist">local_florist</span>
          Complete Journey
        </button>
      </div>
    </div>
  </main>

  <!-- BottomNavBar -->
  <nav
    class="fixed bottom-0 left-0 w-full px-6 pb-6 pt-3 flex justify-around items-center bg-white/80 dark:bg-emerald-950/80 backdrop-blur-md rounded-t-3xl z-50 shadow-[0_-4px_20px_0_rgba(0,0,0,0.05)] border-t border-emerald-100 dark:border-emerald-800">
    <!-- Garden -->
    <div
      class="flex flex-col items-center justify-center text-emerald-400 dark:text-emerald-600 px-5 py-1.5 hover:text-emerald-700 dark:hover:text-yellow-300 transition-all cursor-pointer">
      <span class="material-symbols-outlined" data-icon="local_florist">local_florist</span>
      <span class="text-[11px] font-semibold uppercase tracking-wider mt-1">Garden</span>
    </div>
    <!-- Quiz (Active) -->
    <div
      class="flex flex-col items-center justify-center bg-yellow-400 dark:bg-emerald-800 text-emerald-900 dark:text-yellow-200 rounded-2xl px-5 py-1.5 transition-all scale-90 duration-200 ease-out cursor-pointer">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;" data-icon="quiz">quiz</span>
      <span class="text-[11px] font-semibold uppercase tracking-wider mt-1">Quiz</span>
    </div>
    <!-- Profile -->
    <div
      class="flex flex-col items-center justify-center text-emerald-400 dark:text-emerald-600 px-5 py-1.5 hover:text-emerald-700 dark:hover:text-yellow-300 transition-all cursor-pointer">
      <span class="material-symbols-outlined" data-icon="person">person</span>
      <span class="text-[11px] font-semibold uppercase tracking-wider mt-1">Profile</span>
    </div>
  </nav>

  <!-- Script logic from results.html -->
  <script>
      (function () {
        const card = document.getElementById('resultCard');
        const container = document.getElementById('animationContainer');
        const nameEl = document.getElementById('flowerName');
        const descEl = document.getElementById('flowerDesc');
        const endBtn = document.getElementById('endBtn');

        function mapFlowerNameToTheme(name) {
          if (!name) return '';
          const lower = name.toLowerCase();
          if (lower.includes('rose')) return 'theme-rose';
          if (lower.includes('sunflower')) return 'theme-sunflower';
          if (lower.includes('lotus')) return 'theme-lotus';
          if (lower.includes('lavender')) return 'theme-lavender';
          return 'theme-rose'; // fallback
        }

        // Optimized height notification using ResizeObserver
        if (window.openai?.notifyIntrinsicHeight) {
          const observer = new ResizeObserver(() => {
            window.openai.notifyIntrinsicHeight(document.body.scrollHeight);
          });
          observer.observe(document.body);
        }

        function render(data) {
          if (!data) return;
          const content = data.structuredContent || data;
          const f = content.flower;
          if (!f) {
            nameEl.textContent = 'A Mystery';
            descEl.textContent = 'Oops! We could not fully bloom your results. Please try again.';
            return;
          }

          // Apply theme color
          const theme = mapFlowerNameToTheme(f.name);
          card.classList.add(theme);

          // Trigger bloom animation
          setTimeout(() => {
            container.classList.add('bloom');
          }, 100);

          // Update text
          nameEl.textContent = f.name;
          descEl.textContent = f.description || '';
        }

        function callTool(name, args) {
          if (window.openai?.callTool) {
            window.openai.callTool(name, args);
          } else {
            window.parent.postMessage({
              jsonrpc: '2.0',
              id: (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : Math.random().toString(36).substring(2) + Date.now().toString(36),
              method: 'tools/call',
              params: { name, arguments: args || {} }
            }, '*');
          }
        }

        function syncTheme() {
          if (window.openai?.theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else if (window.openai?.theme === 'light') {
            document.documentElement.classList.remove('dark');
          }
        }

        endBtn.onclick = () => {
          endBtn.textContent = 'Closing...';
          endBtn.disabled = true;
          // Slight fade out effect before calling end
          card.style.opacity = '0';
          setTimeout(() => callTool('end', {}), 400);
        };

        window.addEventListener('message', (event) => {
          if (event.source !== window.parent) return;
          const msg = event.data;
          if (!msg || msg.jsonrpc !== '2.0') return;
          if (msg.method === 'ui/notifications/tool-result') {
            const data = msg.params?.structuredContent || msg.params;
            render(data);
          }
        }, { passive: true });

        // Initial setup
        syncTheme();
        if (window.openai?.toolOutput) {
          render(window.openai.toolOutput);
        }
      })();
  </script>
</body>

</html>
