<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Plantora Results</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            "primary": "#845305",
            "botanical": "#166534",
            "accent": "#facc15",
          },
          fontFamily: {
            "serif": ["Playfair Display", "serif"],
            "sans": ["Public Sans", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    body {
      min-height: 100dvh;
      overflow-x: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .quote-box {
      border-left: 4px solid #0c0a09;
      background: rgba(12, 10, 9, 0.05);
    }

    .dark .quote-box {
      border-left-color: #facc15;
      background: rgba(250, 204, 21, 0.05);
    }

    .trait-card {
      background: rgba(12, 10, 9, 0.05);
      border: 1px solid rgba(12, 10, 9, 0.1);
      transition: all 0.3s ease;
    }

    .dark .trait-card {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .main-button {
      background: #0c0a09;
    }

    .dark .main-button {
      background: #facc15;
    }

    #resultCard {
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    #resultCard.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body class="bg-yellow-400 text-stone-950 font-sans transition-colors duration-300">
  <div class="relative flex min-h-screen w-full flex-col p-8 dark:bg-stone-950 overflow-x-hidden transition-colors">

    <div id="resultCard" class="w-full max-w-2xl mx-auto flex flex-col">
      <!-- Header Image -->
      <div class="relative h-64 mb-8 flex items-center justify-center">
        <img id="flowerImage"
          src="https://zjfltpggvcwomlwfcgci.supabase.co/storage/v1/object/public/assests/marigold.png"
          alt="Flower Match" class="max-w-full max-h-full object-contain filter drop-shadow-2xl">
        <div class="absolute top-0 right-0">
          <span
            class="bg-black/10 dark:bg-white/10 backdrop-blur px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-[0.2em] text-stone-900 dark:text-stone-100">
            Perfect Match Found
          </span>
        </div>
      </div>

      <!-- Content Area -->
      <div class="text-stone-950 dark:text-white transition-colors">
        <h1 id="flowerName" class="font-serif text-6xl font-black mb-6 leading-[0.9] tracking-tighter">Growing...</h1>

        <!-- Poetic Quote -->
        <div class="quote-box p-8 rounded-2xl mb-10">
          <p id="flowerQuote" class="text-stone-900 dark:text-stone-300 font-serif italic text-xl leading-relaxed">
            "Gathering the whispers of the garden to find your botanical essence..."
          </p>
        </div>

        <!-- Traits Grid -->
        <div id="traitsGrid" class="grid grid-cols-2 gap-6 mb-10">
          <!-- Dynamically filled -->
          <div class="trait-card p-6 rounded-3xl flex flex-col items-center justify-center gap-3 opacity-30">
            <span class="material-symbols-outlined text-4xl">hourglass_empty</span>
            <span class="text-[10px] font-black uppercase tracking-[0.2em]">Loading...</span>
          </div>
        </div>

        <!-- Symbolism Block -->
        <div class="flex gap-6 items-start mb-12">
          <div
            class="w-14 h-14 shrink-0 bg-stone-950 dark:bg-yellow-400 rounded-2xl flex items-center justify-center text-yellow-400 dark:text-stone-950 shadow-xl rotate-3">
            <span class="material-symbols-outlined text-xl">format_quote</span>
          </div>
          <p id="flowerMeaning" class="text-stone-900 dark:text-stone-300 font-bold text-lg leading-snug pt-2">
            Analyzing your connection to nature...
          </p>
        </div>

        <!-- Action Button -->
        <button id="playAgainBtn"
          class="main-button w-full py-8 text-yellow-400 dark:text-stone-950 font-black text-2xl rounded-[32px] shadow-2xl hover:scale-[1.03] active:scale-95 transition-all flex items-center justify-center gap-4">
          <span>Search Again</span>
          <span class="material-symbols-outlined text-3xl">refresh</span>
        </button>
      </div>

    </div>


    <script>
        (function () {
          const card = document.getElementById('resultCard');
          const nameEl = document.getElementById('flowerName');
          const quoteEl = document.getElementById('flowerQuote');
          const meaningEl = document.getElementById('flowerMeaning');
          const traitsGrid = document.getElementById('traitsGrid');
          const imageEl = document.getElementById('flowerImage');
          const playAgainBtn = document.getElementById('playAgainBtn');

          // Supabase persistent hosting
          const SUPABASE_IMAGE_BASE = "https://zjfltpggvcwomlwfcgci.supabase.co/storage/v1/object/public/assests/";

          function syncRichContext(flower) {
            if (!flower) return;
            if (window.openai?.updateModelContext) {
              window.openai.updateModelContext({
                content: [{
                  type: "text",
                  text: `The personality journey is complete. The user has matched with the ${flower.name}. 
                     Description: ${flower.description}`
                }]
              });
            }
          }

          function render(data) {
            if (!data) return;
            console.log("[Results] Rendering flower data:", JSON.stringify(data).substring(0, 100) + "...");

            // Flexible content extraction
            let content = data.structuredContent || (data.output && data.output.structuredContent) || data;

            // If the AI sent { result: { flower: ... } } or similar
            if (content.result) content = content.result;

            const f = content.flower || content;
            if (!f || (!f.name && !f.id)) {
              console.warn("[Results] Incomplete flower data received (data structure might be different):", JSON.stringify(data).substring(0, 200));
              return;
            }

            // Populate Content
            nameEl.textContent = f.name || "A Rare Bloom";
            quoteEl.textContent = f.quote ? `"${f.quote}"` : "";
            meaningEl.textContent = f.meaning || f.description || "";

            // Populate Traits
            const traits = f.traits || [];
            if (traits.length > 0) {
              traitsGrid.innerHTML = traits.map(t => `
            <div class="trait-card p-6 rounded-xl flex flex-col items-center justify-center gap-3">
                    <span class="material-symbols-outlined text-3xl text-stone-600 dark:text-stone-400">${t.icon || 'star'}</span>
              <span class="text-[10px] font-black uppercase tracking-widest text-stone-600 dark:text-stone-400 text-center">${t.label || t}</span>
            </div>
          `).join('');
            }

            // Set Image (with fallback to marigold if id doesn't exist)
            const flowerId = f.id || 'marigold';
            imageEl.src = SUPABASE_IMAGE_BASE + `${flowerId}.png`;

            imageEl.onerror = () => {
              imageEl.src = SUPABASE_IMAGE_BASE + "marigold.png";
            };

            // Reveal
            card.classList.add('visible');

            syncRichContext(f);
          }

          playAgainBtn.onclick = () => {
            playAgainBtn.disabled = true;
            playAgainBtn.innerHTML = '<span>Seeding...</span>';

            if (window.openai?.sendFollowUpMessage) {
              window.openai.sendFollowUpMessage({ prompt: "That was fun! Let's play again. Ready for a new persona search!" });
            }

            callTool('start', {});
          };

          function callTool(name, args) {
            console.log(`[Results SDK] callTool('${name}')`);
            if (window.openai?.callTool) {
              window.openai.callTool(name, args);
            } else {
              window.parent.postMessage({
                jsonrpc: '2.0',
                id: 'id-' + Date.now(),
                method: 'tools/call',
                params: { name, arguments: args || {} }
              }, '*');
            }
          }

          window.addEventListener('message', (event) => {
            if (event.source !== window.parent) return;
            const msg = event.data;
            console.log("[Results] Incoming Host Message:", msg.method, msg);

            if (msg?.method === 'ui/notifications/tool-result') {
              console.log("[Results] Received Tool Result Event");
              render(msg.params?.structuredContent || msg.params);
            }
          });

          function initApp() {
            console.log("[Results] Initializing app context...");
            if (window.openai?.toolOutput) {
              render(window.openai.toolOutput);
            } else if (window.openai?.widgetState?.flower) {
              render(window.openai.widgetState);
            }

            let retries = 0;
            const interval = setInterval(() => {
              retries++;
              if (retries > 50) { clearInterval(interval); return; }
              const hasData = !!(window.openai?.toolOutput || window.openai?.widgetState?.flower);
              if (hasData && !card.classList.contains('visible')) {
                console.log("[Results] Retrying sync...");
                render(window.openai.toolOutput || window.openai.widgetState);
                clearInterval(interval);
              }
            }, 200);
          }

          initApp();

          // Theme Sync
          function syncTheme() {
            const theme = window.openai?.theme || 'light';
            console.log("[Results] Syncing theme:", theme);
            if (theme === 'dark') {
              document.documentElement.classList.add('dark');
            } else {
              document.documentElement.classList.remove('dark');
            }
          }
          syncTheme();

          // Auto-Resize
          if (window.openai?.notifyIntrinsicHeight) {
            const observer = new ResizeObserver(() => {
              window.openai.notifyIntrinsicHeight(document.body.scrollHeight);
            });
            observer.observe(document.body);
          }
        })();
    </script>
</body>

</html>
