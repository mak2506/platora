<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Plantora Results</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#ec5b13",
            "botanical": "#166534",
            "sage": "#f0fdf4",
          },
          fontFamily: {
            "serif": ["Playfair Display", "serif"],
            "sans": ["Public Sans", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    body {
      min-height: 100dvh;
      overflow-x: hidden;
    }
    .sun-glow {
      background: radial-gradient(circle at center, #fef08a 0%, transparent 70%);
    }
    /* SVG Flower Animation */
    svg.flower {
      width: 240px;
      height: 240px;
      overflow: visible;
    }
    .petal { transform-origin: 50% 70%; opacity: 0; transform: scale(0); transition: fill 1s ease; }
    .leaf { transform-origin: 50% 90%; opacity: 0; transform: scale(0) rotate(0deg); fill: #22c55e; }
    .stem { stroke-dasharray: 100; stroke-dashoffset: 100; stroke: #16a34a; stroke-width: 4; stroke-linecap: round; fill: none; }
    
    .bloom .stem { animation: drawStem 1.5s ease-out forwards; }
    .bloom .leaf-left { animation: popLeaf 1s 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; transform-origin: bottom right; }
    .bloom .leaf-right { animation: popLeafRight 1s 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; transform-origin: bottom left; }
    .bloom .petal-center { animation: popPetal 1.2s 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .bloom .petal-left { animation: popPetalLeft 1.2s 1.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .bloom .petal-right { animation: popPetalRight 1.2s 1.9s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .bloom .petal-back-left { animation: popPetalBackLeft 1.2s 1.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .bloom .petal-back-right { animation: popPetalBackRight 1.2s 1.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    .theme-rose .petal { fill: #ef4444; }
    .theme-sunflower .petal { fill: #eab308; }
    .theme-lotus .petal { fill: #ec4899; }
    .theme-lavender .petal { fill: #8b5cf6; }
    .theme-sunflower .center-disk { opacity: 0; fill: #422006; animation: fadeInCenter 1s 2s forwards; }
    .center-disk { opacity: 0; }

    @keyframes drawStem { to { stroke-dashoffset: 0; } }
    @keyframes popLeaf { to { opacity: 1; transform: scale(1) rotate(-15deg); } }
    @keyframes popLeafRight { to { opacity: 1; transform: scale(1) rotate(15deg); } }
    @keyframes popPetal { to { opacity: 1; transform: scale(1); } }
    @keyframes popPetalLeft { to { opacity: 1; transform: scale(1) rotate(-25deg); } }
    @keyframes popPetalRight { to { opacity: 1; transform: scale(1) rotate(25deg); } }
    @keyframes popPetalBackLeft { to { opacity: 0.8; transform: scale(0.85) rotate(-45deg); } }
    @keyframes popPetalBackRight { to { opacity: 0.8; transform: scale(0.85) rotate(45deg); } }
    @keyframes fadeInCenter { to { opacity: 1; } }

    .theme-rose #flowerName { color: #dc2626; }
    .theme-sunflower #flowerName { color: #ca8a04; }
    .theme-lotus #flowerName { color: #db2777; }
    .theme-lavender #flowerName { color: #7c3aed; }
  </style>
</head>

<body class="bg-stone-50 text-stone-900 font-sans">
  <div class="relative flex min-h-screen w-full flex-col bg-stone-50 overflow-x-hidden">
    
    <!-- Top Header -->
    <header class="pt-8 pb-4 text-center">
      <h1 class="font-serif text-3xl font-black text-botanical tracking-tight">Plantora</h1>
    </header>

    <main class="flex-1 px-4 pb-32 flex flex-col items-center">
      
      <!-- Result Card -->
      <div id="resultCard" class="w-full bg-white dark:bg-stone-900 rounded-[40px] shadow-2xl shadow-emerald-900/10 p-8 flex flex-col items-center border border-emerald-50 relative overflow-hidden transition-opacity duration-500">
        
        <!-- Decoration -->
        <div class="absolute -top-24 -right-24 w-64 h-64 bg-sage/50 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-orange-50/50 rounded-full blur-3xl"></div>

        <span class="inline-block px-4 py-1.5 bg-emerald-100 text-emerald-800 text-[10px] font-black tracking-[0.2em] uppercase rounded-full mb-8">QUIZ RESULT</span>
        
        <h2 class="font-serif text-4xl font-black text-botanical text-center leading-tight mb-12">Your Plant Soulmate is...</h2>

        <!-- Bloom Animation -->
        <div class="relative h-80 w-full flex items-center justify-center mb-10 overflow-visible">
           <div class="absolute inset-0 sun-glow opacity-30 transform scale-150"></div>
           <!-- Pot -->
           <div class="absolute bottom-4 w-40 h-20 bg-emerald-800 rounded-t-xl rounded-b-[40px] z-10 shadow-xl border-t-4 border-emerald-700"></div>

           <div id="animationContainer" class="relative z-20 pb-16 overflow-visible">
             <svg class="flower" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                <path class="stem" d="M50 110 C 50 80, 50 60, 50 50" />
                <path class="leaf leaf-left" d="M50 90 C 20 90, 10 70, 50 85Z" />
                <path class="leaf leaf-right" d="M50 85 C 80 85, 90 65, 50 80Z" />
                <path class="petal petal-back-left" d="M50 50 C 10 30, 20 -10, 50 50Z" />
                <path class="petal petal-back-right" d="M50 50 C 90 30, 80 -10, 50 50Z" />
                <path class="petal petal-left" d="M50 55 C 10 40, 30 0, 50 55Z" />
                <path class="petal petal-right" d="M50 55 C 90 40, 70 0, 50 55Z" />
                <path class="petal petal-center" d="M50 60 C 20 20, 80 20, 50 60Z" />
                <circle class="center-disk" cx="50" cy="50" r="12" />
             </svg>
           </div>
        </div>

        <div class="text-center z-20 max-w-sm">
          <h3 id="flowerName" class="text-4xl font-serif font-black mb-4 transition-colors duration-300">Growing...</h3>
          <p id="flowerDesc" class="text-stone-500 font-medium leading-relaxed italic px-4">
            Computing the petals of your personality.
          </p>
        </div>

      </div>

      <!-- Action Button -->
      <div class="mt-12 w-full max-w-xs">
         <button id="endBtn"
          class="w-full py-5 bg-gradient-to-r from-emerald-800 to-botanical text-white font-black text-lg rounded-2xl shadow-xl shadow-emerald-900/20 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
          <span class="material-symbols-outlined">local_florist</span>
          <span>Complete Journey</span>
        </button>
      </div>

    </main>

    <!-- Footer -->
    <footer class="py-12 text-center w-full">
       <span class="text-[9px] font-bold text-stone-300 uppercase tracking-[0.3em]">Part of the Botanical Personality Suite</span>
    </footer>

  </div>

  <script>
    (function () {
      const card = document.getElementById('resultCard');
      const container = document.getElementById('animationContainer');
      const nameEl = document.getElementById('flowerName');
      const descEl = document.getElementById('flowerDesc');
      const endBtn = document.getElementById('endBtn');

      function mapFlowerNameToTheme(name) {
        if (!name) return '';
        const lower = name.toLowerCase();
        if (lower.includes('rose')) return 'theme-rose';
        if (lower.includes('sunflower')) return 'theme-sunflower';
        if (lower.includes('lotus')) return 'theme-lotus';
        if (lower.includes('lavender')) return 'theme-lavender';
        return 'theme-rose'; 
      }

      function syncRichContext(flower) {
        if (!flower) return;
        if (window.openai?.updateModelContext) {
          window.openai.updateModelContext({
            content: [{
              type: "text",
              text: `The user's personality journey is complete! They have been matched with the ${flower.name}. 
                     Description: ${flower.description}`
            }]
          });
        }
      }

      function render(data) {
        if (!data) return;
        console.log("[Results] Rendering with data:", JSON.stringify(data).substring(0, 100) + "...");
        const content = data.structuredContent || data;
        const f = content.flower;
        if (!f) {
           console.log("[Results] No flower data found in payload.");
           return;
        }

        const theme = mapFlowerNameToTheme(f.name);
        card.classList.add(theme);

        setTimeout(() => {
          container.classList.add('bloom');
        }, 300);

        nameEl.textContent = f.name;
        descEl.textContent = f.description || '';
        
        syncRichContext(f);

        if (window.openai?.notifyIntrinsicHeight) {
          window.openai.notifyIntrinsicHeight(document.body.scrollHeight);
        }
      }

      endBtn.onclick = () => {
        endBtn.disabled = true;
        endBtn.querySelector('span:last-child').textContent = 'Closing...';
        card.style.opacity = '0';
        setTimeout(() => callTool('end', {}), 400);
      };

      function callTool(name, args) {
        console.log(`[Results SDK] callTool('${name}') with args:`, args);
        if (window.openai?.callTool) {
          window.openai.callTool(name, args);
        } else {
          window.parent.postMessage({
            jsonrpc: '2.0',
            id: 'id-' + Date.now(),
            method: 'tools/call',
            params: { name, arguments: args || {} }
          }, '*');
        }
      }

      // 1. RECOVERY LISTENER
      window.addEventListener('message', (event) => {
        if (event.source !== window.parent) return;
        const msg = event.data;
        if (msg?.method === 'ui/notifications/tool-result') {
          console.log("[Results SDK] Received Tool Result Event:", msg.params);
          render(msg.params?.structuredContent || msg.params);
        }
      });

      // 2. UNIFIED INITIALIZATION
      function initApp() {
        console.log("[Results] Initiating layered sync...");
        
        // Layer 1: Immediate check
        if (window.openai?.toolOutput) {
          render(window.openai.toolOutput);
        } else if (window.openai?.widgetState?.flower) {
          render(window.openai.widgetState);
        }

        // Layer 2: Retries (Host async init)
        let retries = 0;
        const interval = setInterval(() => {
          retries++;
          if (retries > 10) { // Give up after 2 seconds
            clearInterval(interval);
            return;
          }

          const hasData = !!(window.openai?.toolOutput || window.openai?.widgetState?.flower);
          const isRendered = nameEl.textContent && nameEl.textContent !== 'Growing...';

          if (hasData && !isRendered) {
             console.log("[Results] Syncing from delayed host init...");
             render(window.openai.toolOutput || window.openai.widgetState);
             clearInterval(interval);
          }
        }, 200);
      }

      initApp();
    })();
  </script>
</body>

</html>
