<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Plantora Results</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#845305",
            "botanical": "#166534",
            "accent": "#facc15",
          },
          fontFamily: {
            "serif": ["Playfair Display", "serif"],
            "sans": ["Public Sans", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    body {
      min-height: 100dvh;
      overflow-x: hidden;
    }
    .quote-box {
      border-left: 4px solid #f5f5f4;
      background: #f5f5f4;
    }
    .trait-card {
      background: #eeebe6;
    }
    .main-button {
      background: #6a4c04;
    }
    .main-button:hover {
      background: #5a4103;
    }
    #resultCard {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    }
    #resultCard.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body class="bg-[#fdfcf9] text-stone-900 font-sans p-4">
  <div class="max-w-md mx-auto py-8">
    
    <!-- Result Card -->
    <div id="resultCard" class="bg-white rounded-3xl shadow-xl overflow-hidden border border-stone-100">
      
      <!-- Header Image -->
      <div class="relative h-64 overflow-hidden">
        <img id="flowerImage" src="assets/flowers/marigold.png" alt="Flower Match" class="w-full h-full object-cover">
        <div class="absolute top-4 left-4">
           <span class="bg-white/90 backdrop-blur px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-wider text-stone-600 shadow-sm">
             Your Perfect Match
           </span>
        </div>
      </div>

      <!-- Main Content -->
      <div class="p-8 pt-6">
        <h1 id="flowerName" class="font-serif text-5xl font-black text-stone-800 mb-6 leading-tight">Growing...</h1>
        
        <!-- Poetic Quote -->
        <div class="quote-box p-6 rounded-r-2xl mb-8">
           <p id="flowerQuote" class="text-stone-600 font-serif italic text-lg leading-relaxed">
             "Gathering the whispers of the garden to find your botanical essence..."
           </p>
        </div>

        <!-- Traits Grid -->
        <div id="traitsGrid" class="grid grid-cols-2 gap-4 mb-8">
           <!-- Dynamically filled -->
           <div class="trait-card p-4 rounded-xl flex flex-col items-center justify-center gap-2 opacity-50">
             <span class="material-symbols-outlined text-stone-400">hourglass_empty</span>
             <span class="text-[9px] font-black uppercase tracking-widest text-stone-400">Loading...</span>
           </div>
           <div class="trait-card p-4 rounded-xl flex flex-col items-center justify-center gap-2 opacity-50">
             <span class="material-symbols-outlined text-stone-400">hourglass_empty</span>
             <span class="text-[9px] font-black uppercase tracking-widest text-stone-400">Loading...</span>
           </div>
        </div>

        <!-- Symbolism Block -->
        <div class="flex gap-4 items-start mb-8">
           <div class="w-10 h-10 shrink-0 bg-[#facc15] rounded-full flex items-center justify-center text-white shadow-sm">
             <span class="material-symbols-outlined text-sm">format_quote</span>
           </div>
           <p id="flowerMeaning" class="text-stone-700 font-bold text-sm leading-relaxed pt-2">
             Analyzing your connection to nature...
           </p>
        </div>

        <!-- Action Button -->
        <button id="playAgainBtn"
          class="main-button w-full py-5 text-white font-bold text-lg rounded-2xl shadow-lg flex items-center justify-center gap-3 active:scale-[0.98] transition-all">
          <span>Play Again</span>
          <span class="material-symbols-outlined text-xl">refresh</span>
        </button>

      </div>
    </div>

    <!-- Final Footer -->
    <div class="mt-8 text-center pb-8">
       <span class="text-[10px] font-bold text-stone-300 uppercase tracking-[0.3em]">Plantora Personality Quiz</span>
    </div>

  </div>

  <script>
    (function () {
      const card = document.getElementById('resultCard');
      const nameEl = document.getElementById('flowerName');
      const quoteEl = document.getElementById('flowerQuote');
      const meaningEl = document.getElementById('flowerMeaning');
      const traitsGrid = document.getElementById('traitsGrid');
      const imageEl = document.getElementById('flowerImage');
      const playAgainBtn = document.getElementById('playAgainBtn');

      // TIP: If local assets don't load in your host, 
      // paste your GitHub Raw URL here: https://raw.githubusercontent.com/USER/REPO/BRANCH/src/resources/assets/flowers/
      const GITHUB_IMAGE_BASE = ""; 

      function syncRichContext(flower) {
        if (!flower) return;
        if (window.openai?.updateModelContext) {
          window.openai.updateModelContext({
            content: [{
              type: "text",
              text: `The personality journey is complete. The user has matched with the ${flower.name}. 
                     Description: ${flower.description}`
            }]
          });
        }
      }

      function render(data) {
        if (!data) return;
        console.log("[Results] Rendering dynamic mockup data...");
        const content = data.structuredContent || data;
        const f = content.flower;
        if (!f) return;

        // Populate Content
        nameEl.textContent = f.name;
        quoteEl.textContent = `"${f.quote || ''}"`;
        meaningEl.textContent = f.meaning || '';
        
        // Populate Traits
        if (f.traits && f.traits.length >= 2) {
          traitsGrid.innerHTML = f.traits.map(t => `
            <div class="trait-card p-6 rounded-xl flex flex-col items-center justify-center gap-3">
              <span class="material-symbols-outlined text-3xl text-stone-600">${t.icon || 'star'}</span>
              <span class="text-[10px] font-black uppercase tracking-widest text-stone-600 text-center">${t.label}</span>
            </div>
          `).join('');
        }

        // Set Image (with fallback to marigold if id doesn't exist)
        const flowerId = f.id || 'marigold';
        const imagePath = `assets/flowers/${flowerId}.png`;
        imageEl.src = GITHUB_IMAGE_BASE ? (GITHUB_IMAGE_BASE + `${flowerId}.png`) : imagePath;
        
        imageEl.onerror = () => {
          imageEl.src = GITHUB_IMAGE_BASE ? (GITHUB_IMAGE_BASE + "marigold.png") : "assets/flowers/marigold.png";
        };

        // Reveal
        card.classList.add('visible');
        
        syncRichContext(f);

        if (window.openai?.notifyIntrinsicHeight) {
          window.openai.notifyIntrinsicHeight(document.body.scrollHeight);
        }
      }

      playAgainBtn.onclick = () => {
        playAgainBtn.disabled = true;
        playAgainBtn.innerHTML = '<span>Seeding...</span>';
        callTool('start', {});
      };

      function callTool(name, args) {
        console.log(`[Results SDK] callTool('${name}')`);
        if (window.openai?.callTool) {
          window.openai.callTool(name, args);
        } else {
          window.parent.postMessage({
            jsonrpc: '2.0',
            id: 'id-' + Date.now(),
            method: 'tools/call',
            params: { name, arguments: args || {} }
          }, '*');
        }
      }

      window.addEventListener('message', (event) => {
        if (event.source !== window.parent) return;
        const msg = event.data;
        if (msg?.method === 'ui/notifications/tool-result') {
          render(msg.params?.structuredContent || msg.params);
        }
      });

      function initApp() {
        if (window.openai?.toolOutput) {
          render(window.openai.toolOutput);
        } else if (window.openai?.widgetState?.flower) {
          render(window.openai.widgetState);
        }

        let retries = 0;
        const interval = setInterval(() => {
          retries++;
          if (retries > 10) { clearInterval(interval); return; }
          const hasData = !!(window.openai?.toolOutput || window.openai?.widgetState?.flower);
          if (hasData && !card.classList.contains('visible')) {
             render(window.openai.toolOutput || window.openai.widgetState);
             clearInterval(interval);
          }
        }, 200);
      }

      initApp();
    })();
  </script>
</body>

</html>
