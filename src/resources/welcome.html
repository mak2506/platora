<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Plantora Welcome</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#ec5b13",
            "botanical": "#166534",
            "sage": "#f0fdf4",
          },
          fontFamily: {
            "serif": ["Playfair Display", "serif"],
            "sans": ["Public Sans", "sans-serif"],
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            fadeInUp: {
              'from': { opacity: '0', transform: 'translateY(20px)' },
              'to': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>

<body class="bg-stone-50 text-stone-900 font-sans">
  <div class="relative flex-1 flex flex-col bg-stone-50 overflow-hidden items-center justify-center p-6 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-sage via-stone-50 to-stone-50">
    
    <!-- Hero Illustration -->
    <div class="mb-12 animate-float">
      <div class="w-48 h-48 bg-white rounded-full shadow-2xl shadow-emerald-900/10 flex items-center justify-center border-8 border-stone-50/50">
        <span class="text-8xl">🌻</span>
      </div>
    </div>

    <!-- Content -->
    <div class="max-w-xs w-full text-center animate-fade-in-up">
      <h1 class="font-serif text-5xl font-black text-botanical mb-4 tracking-tight">Plantora</h1>
      <p id="message" class="text-stone-500 font-medium leading-relaxed mb-12">
        Awakening the garden... Discover which rare bloom matches your unique spirit.
      </p>

      <!-- Loading State -->
      <div id="loadingContainer" class="w-full h-1.5 bg-stone-200 rounded-full overflow-hidden mb-8">
        <div class="h-full bg-botanical rounded-full w-1/3 animate-[progress_2s_infinite_linear]"></div>
      </div>

      <!-- Start Button -->
      <button id="startBtn" style="display: none;"
        class="w-full py-5 bg-gradient-to-r from-orange-500 to-primary text-white font-black text-lg rounded-2xl shadow-xl shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
        <span>Start Journey</span>
        <span class="material-symbols-outlined">arrow_forward</span>
      </button>

      <!-- Tips Section -->
      <div class="mt-16 py-4 px-6 bg-white/50 rounded-2xl border border-stone-100 backdrop-blur-sm">
        <p id="tip-text" class="text-botanical/60 text-[10px] font-bold uppercase tracking-widest leading-normal">
          Tip: Monstera loves indirect light
        </p>
      </div>
    </div>

    <!-- Footer -->
    <footer class="absolute bottom-8 text-center w-full">
       <span class="text-[9px] font-bold text-stone-300 uppercase tracking-[0.3em]">Part of the Botanical Personality Suite</span>
    </footer>

  </div>

  <style>
    @keyframes progress {
      from { transform: translateX(-100%); }
      to { transform: translateX(300%); }
    }
  </style>

  <script>
    (function () {
      const messageEl = document.getElementById('message');
      const startBtn = document.getElementById('startBtn');
      const loadingContainer = document.getElementById('loadingContainer');
      const tipElement = document.getElementById('tip-text');

      const tips = [
        "Tip: Monstera loves indirect light",
        "Tip: Water succulents only when soil is dry",
        "Tip: Clean leaves help plants breathe better",
        "Tip: Most indoor plants prefer a humid environment",
        "Tip: Rotate your pots for even growth"
      ];

      let currentTipIndex = 0;
      setInterval(() => {
        currentTipIndex = (currentTipIndex + 1) % tips.length;
        tipElement.style.opacity = 0;
        setTimeout(() => {
          tipElement.textContent = tips[currentTipIndex];
          tipElement.style.opacity = 1;
        }, 300);
      }, 5000);

      function syncRichContext() {
        if (window.openai?.updateModelContext) {
          window.openai.updateModelContext({
            content: [{
              type: "text",
              text: "The user is now at the Plantora welcome screen, ready to start their botanical personality journey."
            }]
          });
        }
      }

      function render(data) {
        if (!data) return;
        console.log("[Welcome] Rendering with data:", JSON.stringify(data).substring(0, 100) + "...");
        const content = data.structuredContent || data;
        if (content.message) {
          messageEl.textContent = content.message.replace(/\*\*/g, '').replace(/`/g, '');
        }
        loadingContainer.style.display = 'none';
        startBtn.style.display = 'flex';
        
        syncRichContext();

        if (window.openai?.notifyIntrinsicHeight) {
          window.openai.notifyIntrinsicHeight(document.body.scrollHeight);
        }
      }

      async function callTool(name, args) {
        console.log(`[Welcome SDK] callTool('${name}') with args:`, args);
        try {
          if (window.openai?.callTool) {
            const response = await window.openai.callTool(name, args);
            console.log("[Welcome SDK] Received tool response:", response);
            
            if (name === 'start') {
              if (window.openai?.sendFollowUpMessage) {
                window.openai.sendFollowUpMessage({ prompt: "I'm ready! Let's start the quiz." });
              }
            }
            
            if (response && response.structuredContent) {
              render(response.structuredContent);
            }
          } else {
            console.log("[Welcome SDK] Fallback to postMessage tools/call");
            window.parent.postMessage({
              jsonrpc: '2.0',
              id: 'id-' + Date.now(),
              method: 'tools/call',
              params: { name, arguments: args || {} }
            }, '*');
          }
        } catch (err) {
          console.error("[Welcome SDK] callTool error:", err);
          startBtn.disabled = false;
          startBtn.querySelector('span').textContent = 'Try Again';
        }
      }

      window.addEventListener('message', (event) => {
        if (event.source !== window.parent) return;
        const msg = event.data;
        if (msg?.method === 'ui/notifications/tool-result') {
          console.log("[Welcome SDK] Received Tool Result Event:", msg.params);
          render(msg.params?.structuredContent || msg.params);
        }
      });

      // UNIFIED INITIALIZATION
      function initApp() {
        console.log("[Welcome] Initiating layered sync...");

        // Layer 1: Immediate check
        if (window.openai?.toolOutput) {
          render(window.openai.toolOutput);
        } else if (window.openai?.widgetState) {
          render(window.openai.widgetState);
        }

        // Layer 2: Retries (Host async init)
        let retries = 0;
        const interval = setInterval(() => {
          retries++;
          if (retries > 10) { // Give up after 2 seconds
            clearInterval(interval);
            return;
          }

          const hasData = !!(window.openai?.toolOutput || window.openai?.widgetState);
          const isRendered = loadingContainer.style.display === 'none';

          if (hasData && !isRendered) {
             console.log("[Welcome] Syncing from delayed host init...");
             render(window.openai.toolOutput || window.openai.widgetState);
             clearInterval(interval);
          }
        }, 200);
      }

      initApp();
    })();
  </script>
</body>

</html>
