<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plantora Welcome</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 16px;
      background: #faf9f7;
      color: #1a1a1a;
      line-height: 1.5;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 1.25rem;
      color: #2d5a27;
    }
    .card p {
      margin: 0 0 20px;
      color: #444;
      white-space: pre-wrap;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #2d5a27;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #3d7a37; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Plantora</h2>
    <p id="message">Loading…</p>
    <button id="startBtn" class="btn">Start quiz</button>
  </div>
  <script>
    (function() {
      const messageEl = document.getElementById('message');
      const startBtn = document.getElementById('startBtn');

      function render(data) {
        if (!data) return;
        const msg = data.message || 'Welcome to Plantora! Answer a few questions to discover your flower.';
        messageEl.textContent = msg.replace(/\*\*/g, '').replace(/`/g, '');
      }

      function callTool(name, args) {
        const id = crypto.randomUUID();
        window.parent.postMessage({
          jsonrpc: '2.0',
          id,
          method: 'tools/call',
          params: { name, arguments: args || {} }
        }, '*');
      }

      startBtn.onclick = () => {
        startBtn.disabled = true;
        startBtn.textContent = 'Starting…';
        callTool('start', {});
      };

      window.addEventListener('message', (event) => {
        if (event.source !== window.parent) return;
        const msg = event.data;
        if (!msg || msg.jsonrpc !== '2.0') return;
        if (msg.method === 'ui/notifications/tool-result') {
          const data = msg.params?.structuredContent;
          render(data);
          startBtn.disabled = false;
          startBtn.textContent = 'Start quiz';
        }
      }, { passive: true });

      if (window.openai?.toolOutput) render(window.openai.toolOutput?.structuredContent);
    })();
  </script>
</body>
</html>
