<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Plantora Welcome</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'plantora-joy-bg': '#E6F4EA',
            'plantora-vibrant-green': '#4BC47D',
            'plantora-sunny': '#FFCE45',
            'plantora-deep-green': '#2D5A27',
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'fade-in-out': 'fadeInOut 4s ease-in-out infinite',
            'float': 'float 3s ease-in-out infinite',
          },
          keyframes: {
            fadeInOut: {
              '0%, 100%': { opacity: 0, transform: 'translateY(5px)' },
              '10%, 90%': { opacity: 1, transform: 'translateY(0)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-15px)' },
            }
          }
        }
      }
    }
  </script>
<style>
    /* Progress bar animation */
    @keyframes progress {
      0% { width: 0%; }
      100% { width: 100%; }
    }
    .animate-progress {
      animation: progress 5s linear infinite;
    }

    /* Button styles from welcome.html updated to match new design */
    .btn-gradient {
      background: linear-gradient(135deg, #4BC47D 0%, #2D5A27 100%);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-gradient:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(45, 90, 39, 0.4);
    }
    .btn-gradient:active {
      transform: translateY(1px);
    }
    .btn-gradient:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body class="bg-plantora-joy-bg h-screen w-full flex items-center justify-center m-0 overflow-hidden font-sans">
<main class="relative w-full max-w-md px-6 flex flex-col items-center justify-center">
<section class="bg-white w-full rounded-[2.5rem] p-12 shadow-[0_32px_64px_-16px_rgba(45,90,39,0.15)] flex flex-col items-center text-center transition-all duration-700 ease-out transform scale-100 border border-emerald-50 card">
<div class="mb-4 animate-float text-6xl" data-purpose="floating-emoji">
  🌻
</div>

<h1 class="text-4xl font-extrabold text-plantora-vibrant-green mb-3 tracking-tight">Plantora</h1>
<p id="message" class="text-emerald-800/60 text-base font-semibold mb-10 whitespace-pre-wrap">Awakening the garden...</p>

<!-- Loading Progress -->
<div id="loadingContainer" class="w-full h-2 bg-emerald-50 rounded-full overflow-hidden mb-12">
<div class="h-full bg-gradient-to-r from-plantora-vibrant-green to-plantora-sunny rounded-full animate-progress shadow-[0_0_12px_rgba(75,196,125,0.4)]" style="width: 30%;"></div>
</div>

<!-- The start button (initially hidden) -->
<button id="startBtn" class="btn-gradient text-white px-8 py-3 rounded-full text-lg font-semibold w-full max-w-[200px] mb-8" style="display: none;">Start journey</button>

<div class="min-h-[4rem] w-full flex items-center justify-center px-6 py-3 bg-emerald-50/30 rounded-2xl border border-white/50">
<p class="text-plantora-deep-green text-sm font-medium italic animate-fade-in-out" id="tip-text">
        Tip: Monstera loves indirect light
      </p>
</div>
</section>

</main>

<script>
  // Tip rotation
  const tips = [
    "Tip: Monstera loves indirect light",
    "Tip: Water succulents only when soil is dry",
    "Tip: Clean leaves help plants breathe better",
    "Tip: Most indoor plants prefer a humid environment",
    "Tip: Use filtered water for sensitive ferns",
    "Tip: Rotate your pots for even growth"
  ];

  let currentTipIndex = 0;
  const tipElement = document.getElementById('tip-text');

  function rotateTip() {
    currentTipIndex = (currentTipIndex + 1) % tips.length;
    setTimeout(() => {
      tipElement.textContent = tips[currentTipIndex];
    }, 500); 
  }
  setInterval(rotateTip, 4000);

  // Core Logic from welcome.html
  (function() {
    const messageEl = document.getElementById('message');
    const startBtn = document.getElementById('startBtn');
    const loadingContainer = document.getElementById('loadingContainer');

    function render(data) {
      if (!data) return;
      const msg = data.message || 'Welcome to Plantora! Answer a few simple questions to discover your true inner flower.';
      messageEl.textContent = msg.replace(/\*\*/g, '').replace(/`/g, '');
      
      // Hide loading bar and show button
      loadingContainer.style.display = 'none';
      startBtn.style.display = 'inline-block';
      startBtn.style.animation = 'fadeInUp 0.5s 0.2s both';
    }

    function callTool(name, args) {
      const id = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : Math.random().toString(36).substring(2) + Date.now().toString(36);
      window.parent.postMessage({
        jsonrpc: '2.0',
        id,
        method: 'tools/call',
        params: { name, arguments: args || {} }
      }, '*');
    }

    startBtn.onclick = () => {
      startBtn.disabled = true;
      startBtn.textContent = 'Planting seeds...';
      document.querySelector('.card').style.animation = 'fadeInUp 0.5s reverse forwards';
      setTimeout(() => callTool('start', {}), 400);
    };

    window.addEventListener('message', (event) => {
      if (event.source !== window.parent) return;
      const msg = event.data;
      if (!msg || msg.jsonrpc !== '2.0') return;
      if (msg.method === 'ui/notifications/tool-result') {
        const data = msg.params?.structuredContent;
        render(data);
        startBtn.disabled = false;
        startBtn.textContent = 'Start journey';
      }
    }, { passive: true });

    if (window.openai?.toolOutput) render(window.openai.toolOutput);
  })();
</script>
</body>
</html>
