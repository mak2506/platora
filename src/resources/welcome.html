<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plantora Welcome</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 16px;
      background: linear-gradient(135deg, #f0fDf4 0%, #e0f2fe 100%);
      color: #1a1a1a;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 32px 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
      text-align: center;
      max-width: 400px;
      width: 100%;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      border: 1px solid rgba(255,255,255,0.5);
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
      display: inline-block;
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 1.75rem;
      color: #166534;
      font-weight: 700;
    }
    .card p {
      margin: 0 0 24px;
      color: #4b5563;
      white-space: pre-wrap;
      font-size: 1.05rem;
    }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: "";
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: all 0.5s;
    }
    .btn:hover::before {
      left: 100%;
    }
    .btn:hover { 
      background: #15803d;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(22, 163, 74, 0.4);
    }
    .btn:active {
      transform: translateY(1px);
    }
    .btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌱</div>
    <h2>Plantora</h2>
    <p id="message">Awakening the garden...</p>
    <button id="startBtn" class="btn" style="display: none;">Start journey</button>
  </div>
  <script>
    (function() {
      const messageEl = document.getElementById('message');
      const startBtn = document.getElementById('startBtn');

      function render(data) {
        if (!data) return;
        const msg = data.message || 'Welcome to Plantora! Answer a few simple questions to discover your true inner flower.';
        messageEl.textContent = msg.replace(/\*\*/g, '').replace(/`/g, '');
        startBtn.style.display = 'inline-block';
        startBtn.style.animation = 'fadeInUp 0.5s 0.2s both';
      }

      function callTool(name, args) {
        const id = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : Math.random().toString(36).substring(2) + Date.now().toString(36);
        window.parent.postMessage({
          jsonrpc: '2.0',
          id,
          method: 'tools/call',
          params: { name, arguments: args || {} }
        }, '*');
      }

      startBtn.onclick = () => {
        startBtn.disabled = true;
        startBtn.textContent = 'Planting seeds...';
        document.querySelector('.card').style.animation = 'fadeInUp 0.5s reverse forwards';
        setTimeout(() => callTool('start', {}), 400);
      };

      window.addEventListener('message', (event) => {
        if (event.source !== window.parent) return;
        const msg = event.data;
        if (!msg || msg.jsonrpc !== '2.0') return;
        if (msg.method === 'ui/notifications/tool-result') {
          const data = msg.params?.structuredContent;
          render(data);
          startBtn.disabled = false;
          startBtn.textContent = 'Start journey';
        }
      }, { passive: true });

      if (window.openai?.toolOutput) render(window.openai.toolOutput);
    })();
  </script>
</body>
</html>
